<!DOCTYPE html>
<html>
<head>
  <title>ASLAB - Multi-Subject Item Analysis</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f7fa;
    }

    h1 {
      text-align: center;
    }

    textarea {
      width: 100%;
      height: 120px;
    }

    button {
      padding: 10px 20px;
      margin-top: 10px;
      cursor: pointer;
    }

    .card {
      background: white;
      padding: 15px;
      margin-top: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: center;
    }

    .keep { background: #d4edda; }
    .revise { background: #fff3cd; }
    .remove { background: #f8d7da; }
  </style>
</head>
<body>

<h1>ASLAB (Assessment Lab)</h1>

<div class="card">
  <h3>Input Data (CSV Format)</h3>
  <p><b>Format:</b> StudentID,Subject,Q1,Q2,Q3,...</p>

<textarea id="data">
Student1,Math,A,B,C,D,A
Student1,Science,B,B,C,D,A
Student2,Math,A,B,D,D,A
Student2,Science,B,C,C,D,A
Student3,Math,A,B,C,D,B
Student3,Science,B,B,C,D,A
</textarea>

  <button onclick="analyze()">Analyze All Subjects</button>
</div>

<div id="output"></div>

<script>
function analyze() {
  let raw = document.getElementById("data").value.trim().split("\n");

  let dataset = raw.map(row => row.split(","));
  
  let grouped = {};

  // Group by subject
  dataset.forEach(row => {
    let student = row[0];
    let subject = row[1];
    let answers = row.slice(2);

    if (!grouped[subject]) grouped[subject] = [];
    grouped[subject].push({ student, answers });
  });

  let outputHTML = "";

  for (let subject in grouped) {
    let students = grouped[subject];
    let totalStudents = students.length;
    let numQuestions = students[0].answers.length;

    // Auto-detect answer key (most common answer per question)
    let key = [];

    for (let i = 0; i < numQuestions; i++) {
      let freq = {};
      students.forEach(s => {
        let ans = s.answers[i];
        freq[ans] = (freq[ans] || 0) + 1;
      });

      key[i] = Object.keys(freq).reduce((a, b) => freq[a] > freq[b] ? a : b);
    }

    // Score students
    let scored = students.map(s => {
      let score = s.answers.reduce((acc, ans, i) =>
        acc + (ans === key[i] ? 1 : 0), 0);
      return { ...s, score };
    });

    // Sort for top/bottom groups
    let sorted = scored.sort((a,b) => b.score - a.score);
    let groupSize = Math.max(1, Math.floor(totalStudents * 0.27));

    let top = sorted.slice(0, groupSize);
    let bottom = sorted.slice(-groupSize);

    let insights = [];
    let table = `<div class="card"><h3>${subject}</h3>`;
    table += `<table>
      <tr><th>Q#</th><th>Difficulty</th><th>Discrimination</th><th>Action</th></tr>`;

    for (let i = 0; i < numQuestions; i++) {
      let correct = scored.filter(s => s.answers[i] === key[i]).length;
      let difficulty = correct / totalStudents;

      let topCorrect = top.filter(s => s.answers[i] === key[i]).length;
      let bottomCorrect = bottom.filter(s => s.answers[i] === key[i]).length;

      let d = (topCorrect - bottomCorrect) / groupSize;

      let action = "";
      let className = "";

      if (d < 0) {
        action = "REMOVE";
        className = "remove";
        insights.push(`Q${i+1}: Negative discrimination (possible wrong key or confusing question).`);
      } else if (d < 0.2) {
        action = "REVISE";
        className = "revise";
      } else {
        action = "KEEP";
        className = "keep";
      }

      if (difficulty > 0.85) {
        insights.push(`Q${i+1}: Too easy.`);
      } else if (difficulty < 0.2) {
        insights.push(`Q${i+1}: Too difficult.`);
      }

      table += `<tr class="${className}">
        <td>${i+1}</td>
        <td>${difficulty.toFixed(2)}</td>
        <td>${d.toFixed(2)}</td>
        <td>${action}</td>
      </tr>`;
    }

    table += `</table>`;

    // Insights section
    if (insights.length > 0) {
      table += `<p><b>Insights:</b><br>• ${insights.join("<br>• ")}</p>`;
    }

    table += `</div>`;

    outputHTML += table;
  }

  document.getElementById("output").innerHTML = outputHTML;
}
</script>

</body>
</html>
