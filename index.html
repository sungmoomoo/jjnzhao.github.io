<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASLAB — Assessment Lab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .card { transition: all 0.2s; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
    .tab-active { border-bottom: 3px solid #2563eb; color: #2563eb; font-weight: 600; }
  </style>
</head>
<body class="bg-zinc-100 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 min-h-screen">

<header class="bg-zinc-900 text-white py-5 px-8 flex items-center justify-between">
  <div class="flex items-center gap-3">
    <i class="fa-solid fa-flask text-3xl text-blue-500"></i>
    <div>
      <h1 class="text-2xl font-bold tracking-tight">ASLAB</h1>
      <p class="text-xs text-zinc-400">Assessment Lab — Item Analysis</p>
    </div>
  </div>
  <div class="flex items-center gap-4">
    <button onclick="toggleTheme()" class="p-2 rounded-lg hover:bg-zinc-800">
      <i id="theme-icon" class="fa-solid fa-moon text-xl"></i>
    </button>
    <button onclick="loadSampleData()" 
            class="px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-lg text-sm flex items-center gap-2">
      <i class="fa-solid fa-file-import"></i> Load Sample
    </button>
  </div>
</header>

<div class="max-w-7xl mx-auto p-6">

  <!-- Upload Section -->
  <div class="card bg-white dark:bg-zinc-900 rounded-2xl shadow p-8 mb-8">
    <h2 class="text-2xl font-semibold mb-2">Upload Student Responses</h2>
    <p class="text-zinc-500 dark:text-zinc-400 mb-6">Format: <code>StudentID,Subject,Q1,Q2,Q3,...</code> (CSV or paste below). Supports multiple subjects.</p>

    <div id="dropzone"
         class="border-2 border-dashed border-zinc-300 dark:border-zinc-700 rounded-2xl p-12 text-center cursor-pointer hover:border-blue-500 transition-colors">
      <i class="fa-solid fa-cloud-arrow-up text-5xl text-zinc-400 mb-4"></i>
      <p class="text-lg font-medium">Drag & drop CSV file here</p>
      <p class="text-sm text-zinc-500">or</p>
      <label class="mt-4 inline-block px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-xl cursor-pointer">
        Browse File
        <input type="file" id="fileInput" accept=".csv" class="hidden" onchange="handleFile(event)">
      </label>
    </div>

    <div class="mt-6">
      <textarea id="data" rows="8" 
                class="w-full p-5 border border-zinc-300 dark:border-zinc-700 rounded-2xl font-mono text-sm bg-white dark:bg-zinc-950"
                placeholder="Paste your data here..."></textarea>
    </div>

    <div class="flex gap-4 mt-6">
      <button onclick="analyze()" 
              class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-2xl font-semibold text-lg flex items-center justify-center gap-3">
        <i class="fa-solid fa-chart-bar"></i>
        Analyze All Subjects
      </button>
    </div>
  </div>

  <!-- Results -->
  <div id="output" class="space-y-10"></div>
</div>

<script>
// Tailwind script already included via CDN

let currentData = [];
let isDark = false;

function toggleTheme() {
  isDark = !isDark;
  document.documentElement.classList.toggle('dark', isDark);
  document.getElementById('theme-icon').classList.toggle('fa-moon', !isDark);
  document.getElementById('theme-icon').classList.toggle('fa-sun', isDark);
}

// Drag & Drop
const dropzone = document.getElementById('dropzone');
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('border-blue-500'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('border-blue-500'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('border-blue-500');
