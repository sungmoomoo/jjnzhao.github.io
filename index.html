<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASLAB — Assessment Lab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body { font-family: 'Inter', system_ui, sans-serif; }
    .hero-bg {
      background: linear-gradient(135deg, #1e2937 0%, #0f172a 100%);
    }
    .fade-in {
      animation: fadeIn 1s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
    }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen overflow-hidden">

  <!-- Welcome Screen -->
  <div id="welcome-screen" class="hero-bg min-h-screen flex items-center justify-center relative">
    <div class="absolute inset-0 bg-[radial-gradient(at_center,#3b82f610_0%,transparent_70%)]"></div>
    
    <div class="max-w-2xl mx-auto text-center px-6 fade-in">
      <!-- Logo -->
      <div class="flex justify-center mb-8">
        <div class="flex items-center gap-4">
          <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center shadow-2xl">
            <i class="fa-solid fa-flask text-4xl"></i>
          </div>
          <div class="text-left">
            <h1 class="text-5xl font-bold tracking-tighter">ASLAB</h1>
            <p class="text-blue-400 text-lg -mt-1">Assessment Lab</p>
          </div>
        </div>
      </div>

      <h2 class="text-6xl font-semibold tracking-tight mb-6 leading-tight">
        Make better assessments.<br>
        <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400">In seconds.</span>
      </h2>

      <p class="text-xl text-zinc-400 max-w-md mx-auto mb-12">
        Professional item analysis with difficulty, discrimination, 
        distractor insights and smart recommendations.
      </p>

      <!-- Buttons -->
      <div class="flex flex-col sm:flex-row gap-4 justify-center">
        <button onclick="startApp()" 
                class="group px-10 py-5 bg-white text-zinc-900 rounded-2xl font-semibold text-lg flex items-center justify-center gap-3 hover:scale-105 transition-all duration-300">
          <span>Get Started Free</span>
          <i class="fa-solid fa-arrow-right group-active:translate-x-1 transition"></i>
        </button>

        <button onclick="loadSampleData()" 
                class="px-8 py-5 border border-zinc-700 hover:border-zinc-500 rounded-2xl font-medium text-lg flex items-center gap-3 transition">
          <i class="fa-solid fa-file-chart-column"></i>
          Try with Sample Data
        </button>
      </div>

      <div class="mt-16 text-xs text-zinc-500 flex items-center justify-center gap-8">
        <div class="flex items-center gap-2">
          <i class="fa-solid fa-check"></i>
          No signup required
        </div>
        <div class="flex items-center gap-2">
          <i class="fa-solid fa-check"></i>
          Works offline
        </div>
        <div class="flex items-center gap-2">
          <i class="fa-solid fa-check"></i>
          Export reports
        </div>
      </div>
    </div>

    <!-- Subtle footer -->
    <div class="absolute bottom-8 left-1/2 -translate-x-1/2 text-zinc-500 text-sm">
      Built for teachers • Powered by psychometrics
    </div>
  </div>

  <div id="main-app" class="hidden min-h-screen bg-zinc-100
